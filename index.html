<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Currículo Comunitário - Projeto</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc;
            color: #1e293b;
        }
        .resume-preview {
            background: white;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.15);
            width: 210mm;
            min-height: 297mm;
            margin: 0 auto;
            padding: 20mm;
            transition: all 0.3s ease;
        }
        .form-card {
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        .form-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05);
        }
        .tooltip {
            visibility: hidden;
            opacity: 0;
            transition: opacity 0.3s;
        }
        .group:hover .tooltip {
            visibility: visible;
            opacity: 1;
        }
        @media print {
            body { background: white; }
            .no-print { display: none; }
            .resume-preview {
                box-shadow: none;
                margin: 0;
                width: 100%;
            }
        }
        /* Custom scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f1f1;
        }
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const SKILL_PRESETS = [
            "Atendimento ao Público", "Operação de Caixa", "Limpeza e Organização", 
            "Preparo de Lanches", "Ajudante de Cozinha", "Reposição de Estoque", 
            "Trabalho em Equipe", "Pontualidade", "Pedreiro", "Ajudante de Obras", 
            "Pintura Residencial", "Assentamento de Piso", "Instalações Básicas", 
            "Manutenção Preventiva", "Carga e Descarga", "Comunicação Clara"
        ];

        const Tooltip = ({ text }) => (
            <div className="absolute z-10 p-2 text-xs text-white bg-slate-800 rounded-lg shadow-xl -top-10 left-0 tooltip w-48">
                {text}
                <div className="absolute -bottom-1 left-4 w-2 h-2 bg-slate-800 rotate-45"></div>
            </div>
        );

        const HelpIcon = ({ text }) => (
            <div className="relative group inline-block ml-1">
                <span className="cursor-help text-indigo-400 hover:text-indigo-600">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16">
                        <path d="M8 15A7 7 0 1 1 8 1a7 7 0 0 1 0 14zm0 1A8 8 0 1 0 8 0a8 8 0 0 0 0 16z"/>
                        <path d="M5.255 5.786a.237.237 0 0 0 .241.247h.825c.138 0 .248-.113.266-.25.09-.656.54-1.134 1.342-1.134.686 0 1.314.343 1.314 1.168 0 .635-.374.927-.965 1.371-.673.489-1.206 1.06-1.168 1.987l.003.217a.25.25 0 0 0 .25.246h.811a.25.25 0 0 0 .25-.25v-.105c0-.718.273-.927 1.01-1.486.609-.463 1.244-.977 1.244-2.056 0-1.511-1.276-2.241-2.673-2.241-1.267 0-2.655.59-2.75 2.286zm1.557 5.763c0 .533.425.927 1.01.927.609 0 1.028-.394 1.028-.927 0-.552-.42-.944-1.029-.944-.585 0-1.01.392-1.01.944z"/>
                    </svg>
                </span>
                <Tooltip text={text} />
            </div>
        );

        function App() {
            const [data, setData] = useState({
                name: "Seu Nome Completo",
                email: "seu@email.com",
                phone: "(00) 00000-0000",
                location: "Sua Cidade, Estado",
                summary: "Sou uma pessoa dedicada e pontual, com facilidade para aprender novas tarefas e trabalhar em equipe. Busco uma oportunidade para contribuir com meu esforço e vontade de trabalhar.",
                photo: null,
                experience: [
                    { id: 1, role: "Cargo (Ex: Atendente ou Pedreiro)", company: "Nome da Empresa ou Local", period: "Jan 2022 - Mar 2024", description: "Explique o que você fazia no dia a dia." }
                ],
                education: [
                    { id: 1, degree: "Ensino Fundamental/Médio", school: "Nome da Escola", period: "Concluído em 2020" }
                ],
                skills: ["Atendimento ao Público", "Pontualidade"]
            });

            const resumeRef = useRef();

            const handlePhotoChange = (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onloadend = () => {
                        setData({ ...data, photo: reader.result });
                    };
                    reader.readAsDataURL(file);
                }
            };

            const addExperience = () => {
                setData({
                    ...data,
                    experience: [...data.experience, { id: Date.now(), role: "", company: "", period: "", description: "" }]
                });
            };

            const addEducation = () => {
                setData({
                    ...data,
                    education: [...data.education, { id: Date.now(), degree: "", school: "", period: "" }]
                });
            };

            const toggleSkill = (skill) => {
                const newSkills = data.skills.includes(skill)
                    ? data.skills.filter(s => s !== skill)
                    : [...data.skills, skill];
                setData({ ...data, skills: newSkills });
            };

            const exportPDF = () => {
                const element = resumeRef.current;
                const opt = {
                    margin: 0,
                    filename: `curriculo_${data.name.replace(/\s+/g, '_').toLowerCase()}.pdf`,
                    image: { type: 'jpeg', quality: 0.98 },
                    html2canvas: { scale: 2, useCORS: true },
                    jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
                };
                html2pdf().set(opt).from(element).save();
            };

            return (
                <div className="min-h-screen flex flex-col lg:flex-row bg-slate-50">
                    {/* Painel de Edição */}
                    <div className="w-full lg:w-1/2 p-4 md:p-8 overflow-y-auto max-h-screen no-print bg-white shadow-inner">
                        <header className="mb-8 p-6 bg-gradient-to-br from-indigo-600 to-blue-700 rounded-2xl text-white shadow-lg">
                            <h1 className="text-3xl font-bold flex items-center gap-3">
                                <span className="bg-white/20 p-2 rounded-lg">📄</span> Currículo Comunitário
                            </h1>
                            <p className="mt-3 text-indigo-100 font-medium">Ferramenta gratuita para ajudar você a conquistar seu próximo trabalho.</p>
                            
                            <div className="mt-6 bg-white/10 p-4 rounded-xl border border-white/20 text-sm">
                                <p className="font-bold flex items-center gap-2">💡 Como usar:</p>
                                <ul className="mt-2 space-y-1 text-indigo-50">
                                    <li>1. Preencha seus dados à esquerda.</li>
                                    <li>2. Veja como fica o desenho à direita.</li>
                                    <li>3. Quando terminar, clique no botão verde para baixar!</li>
                                </ul>
                            </div>
                        </header>

                        <div className="space-y-8">
                            {/* Informações Básicas */}
                            <section className="bg-white p-6 rounded-2xl border border-slate-200 form-card shadow-sm">
                                <h2 className="text-xl font-bold mb-6 text-slate-800 flex items-center gap-2">
                                    <span className="w-8 h-8 bg-indigo-100 text-indigo-600 rounded-full flex items-center justify-center text-sm">1</span>
                                    Informações Pessoais
                                </h2>
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                    <div className="md:col-span-2">
                                        <label className="block text-sm font-semibold text-slate-700 mb-2">
                                            Sua Foto
                                            <HelpIcon text="Coloque uma foto onde seu rosto apareça bem. Ajuda as empresas a lembrarem de você." />
                                        </label>
                                        <div className="flex items-center gap-4">
                                            {data.photo && <img src={data.photo} className="w-16 h-16 rounded-full object-cover border-2 border-indigo-100" />}
                                            <input 
                                                type="file" 
                                                accept="image/*" 
                                                onChange={handlePhotoChange}
                                                className="block w-full text-sm text-slate-500 file:mr-4 file:py-2.5 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-indigo-50 file:text-indigo-700 hover:file:bg-indigo-100 transition-colors"
                                            />
                                        </div>
                                    </div>
                                    <div className="md:col-span-2">
                                        <label className="block text-sm font-semibold text-slate-700 mb-2">Nome Completo</label>
                                        <input 
                                            type="text" 
                                            placeholder="Ex: João da Silva"
                                            value={data.name} 
                                            onChange={(e) => setData({...data, name: e.target.value})}
                                            className="w-full rounded-xl border-slate-200 shadow-sm focus:border-indigo-500 focus:ring-4 focus:ring-indigo-500/10 p-3 border transition-all"
                                        />
                                    </div>
                                    <div>
                                        <label className="block text-sm font-semibold text-slate-700 mb-2">
                                            E-mail
                                            <HelpIcon text="Se não tiver e-mail, pode deixar o exemplo ou em branco." />
                                        </label>
                                        <input 
                                            type="email" 
                                            value={data.email} 
                                            onChange={(e) => setData({...data, email: e.target.value})}
                                            className="w-full rounded-xl border-slate-200 shadow-sm focus:border-indigo-500 focus:ring-4 focus:ring-indigo-500/10 p-3 border transition-all"
                                        />
                                    </div>
                                    <div>
                                        <label className="block text-sm font-semibold text-slate-700 mb-2">Telefone</label>
                                        <input 
                                            type="text" 
                                            value={data.phone} 
                                            onChange={(e) => setData({...data, phone: e.target.value})}
                                            className="w-full rounded-xl border-slate-200 shadow-sm focus:border-indigo-500 focus:ring-4 focus:ring-indigo-500/10 p-3 border transition-all"
                                        />
                                    </div>
                                    <div className="md:col-span-2">
                                        <label className="block text-sm font-semibold text-slate-700 mb-2">Onde você mora?</label>
                                        <input 
                                            type="text" 
                                            placeholder="Ex: Bairro Tal, Sua Cidade"
                                            value={data.location} 
                                            onChange={(e) => setData({...data, location: e.target.value})}
                                            className="w-full rounded-xl border-slate-200 shadow-sm focus:border-indigo-500 focus:ring-4 focus:ring-indigo-500/10 p-3 border transition-all"
                                        />
                                    </div>
                                    <div className="md:col-span-2">
                                        <label className="block text-sm font-semibold text-slate-700 mb-2">
                                            Sobre você
                                            <HelpIcon text="Escreva um pouco sobre sua vontade de trabalhar e o que você sabe fazer de melhor." />
                                        </label>
                                        <textarea 
                                            rows="3"
                                            value={data.summary} 
                                            onChange={(e) => setData({...data, summary: e.target.value})}
                                            className="w-full rounded-xl border-slate-200 shadow-sm focus:border-indigo-500 focus:ring-4 focus:ring-indigo-500/10 p-3 border transition-all"
                                        ></textarea>
                                    </div>
                                </div>
                            </section>

                            {/* Experiência */}
                            <section className="bg-white p-6 rounded-2xl border border-slate-200 form-card shadow-sm">
                                <div className="flex justify-between items-center mb-6">
                                    <h2 className="text-xl font-bold text-slate-800 flex items-center gap-2">
                                        <span className="w-8 h-8 bg-indigo-100 text-indigo-600 rounded-full flex items-center justify-center text-sm">2</span>
                                        Trabalhos Anteriores
                                    </h2>
                                    <button 
                                        onClick={addExperience}
                                        className="bg-indigo-50 text-indigo-600 px-4 py-2 rounded-lg text-sm font-bold hover:bg-indigo-100 transition-colors"
                                    >+ Adicionar</button>
                                </div>
                                {data.experience.map((exp, index) => (
                                    <div key={exp.id} className="mb-6 p-6 bg-slate-50 rounded-2xl border border-slate-100 relative group">
                                        <button 
                                            onClick={() => setData({...data, experience: data.experience.filter(e => e.id !== exp.id)})}
                                            className="absolute top-4 right-4 text-slate-400 hover:text-red-500 transition-colors"
                                        >
                                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" viewBox="0 0 16 16">
                                                <path d="M4.646 4.646a.5.5 0 0 1 .708 0L8 7.293l2.646-2.647a.5.5 0 0 1 .708.708L8.707 8l2.647 2.646a.5.5 0 0 1-.708.708L8 8.707l-2.646 2.647a.5.5 0 0 1-.708-.708L7.293 8 4.646 5.354a.5.5 0 0 1 0-.708z"/>
                                            </svg>
                                        </button>
                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                            <div>
                                                <label className="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1">Qual era o cargo?</label>
                                                <input 
                                                    type="text" 
                                                    value={exp.role} 
                                                    onChange={(e) => {
                                                        const newExp = [...data.experience];
                                                        newExp[index].role = e.target.value;
                                                        setData({...data, experience: newExp});
                                                    }}
                                                    className="w-full rounded-xl border-slate-200 p-2.5 border"
                                                />
                                            </div>
                                            <div>
                                                <label className="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1">Onde trabalhou?</label>
                                                <input 
                                                    type="text" 
                                                    value={exp.company} 
                                                    onChange={(e) => {
                                                        const newExp = [...data.experience];
                                                        newExp[index].company = e.target.value;
                                                        setData({...data, experience: newExp});
                                                    }}
                                                    className="w-full rounded-xl border-slate-200 p-2.5 border"
                                                />
                                            </div>
                                            <div>
                                                <label className="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1">Quanto tempo?</label>
                                                <input 
                                                    type="text" 
                                                    placeholder="Ex: 2 anos ou 2021-2023"
                                                    value={exp.period} 
                                                    onChange={(e) => {
                                                        const newExp = [...data.experience];
                                                        newExp[index].period = e.target.value;
                                                        setData({...data, experience: newExp});
                                                    }}
                                                    className="w-full rounded-xl border-slate-200 p-2.5 border"
                                                />
                                            </div>
                                            <div className="md:col-span-2">
                                                <label className="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1">O que você fazia?</label>
                                                <textarea 
                                                    rows="2"
                                                    value={exp.description} 
                                                    onChange={(e) => {
                                                        const newExp = [...data.experience];
                                                        newExp[index].description = e.target.value;
                                                        setData({...data, experience: newExp});
                                                    }}
                                                    className="w-full rounded-xl border-slate-200 p-2.5 border"
                                                ></textarea>
                                            </div>
                                        </div>
                                    </div>
                                ))}
                            </section>

                            {/* Formação */}
                            <section className="bg-white p-6 rounded-2xl border border-slate-200 form-card shadow-sm">
                                <div className="flex justify-between items-center mb-6">
                                    <h2 className="text-xl font-bold text-slate-800 flex items-center gap-2">
                                        <span className="w-8 h-8 bg-indigo-100 text-indigo-600 rounded-full flex items-center justify-center text-sm">3</span>
                                        Estudos
                                    </h2>
                                    <button 
                                        onClick={addEducation}
                                        className="bg-indigo-50 text-indigo-600 px-4 py-2 rounded-lg text-sm font-bold hover:bg-indigo-100 transition-colors"
                                    >+ Adicionar</button>
                                </div>
                                {data.education.map((edu, index) => (
                                    <div key={edu.id} className="mb-6 p-6 bg-slate-50 rounded-2xl border border-slate-100 relative group">
                                        <button 
                                            onClick={() => setData({...data, education: data.education.filter(e => e.id !== edu.id)})}
                                            className="absolute top-4 right-4 text-slate-400 hover:text-red-500 transition-colors"
                                        >
                                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" viewBox="0 0 16 16">
                                                <path d="M4.646 4.646a.5.5 0 0 1 .708 0L8 7.293l2.646-2.647a.5.5 0 0 1 .708.708L8.707 8l2.647 2.646a.5.5 0 0 1-.708.708L8 8.707l-2.646 2.647a.5.5 0 0 1-.708-.708L7.293 8 4.646 5.354a.5.5 0 0 1 0-.708z"/>
                                            </svg>
                                        </button>
                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                            <div>
                                                <label className="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1">Curso ou Série</label>
                                                <input 
                                                    type="text" 
                                                    value={edu.degree} 
                                                    onChange={(e) => {
                                                        const newEdu = [...data.education];
                                                        newEdu[index].degree = e.target.value;
                                                        setData({...data, education: newEdu});
                                                    }}
                                                    className="w-full rounded-xl border-slate-200 p-2.5 border"
                                                />
                                            </div>
                                            <div>
                                                <label className="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1">Escola</label>
                                                <input 
                                                    type="text" 
                                                    value={edu.school} 
                                                    onChange={(e) => {
                                                        const newEdu = [...data.education];
                                                        newEdu[index].school = e.target.value;
                                                        setData({...data, education: newEdu});
                                                    }}
                                                    className="w-full rounded-xl border-slate-200 p-2.5 border"
                                                />
                                            </div>
                                            <div>
                                                <label className="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1">Ano que terminou</label>
                                                <input 
                                                    type="text" 
                                                    value={edu.period} 
                                                    onChange={(e) => {
                                                        const newEdu = [...data.education];
                                                        newEdu[index].period = e.target.value;
                                                        setData({...data, education: newEdu});
                                                    }}
                                                    className="w-full rounded-xl border-slate-200 p-2.5 border"
                                                />
                                            </div>
                                        </div>
                                    </div>
                                ))}
                            </section>

                            {/* Habilidades */}
                            <section className="bg-white p-6 rounded-2xl border border-slate-200 form-card shadow-sm">
                                <h2 className="text-xl font-bold mb-6 text-slate-800 flex items-center gap-2">
                                    <span className="w-8 h-8 bg-indigo-100 text-indigo-600 rounded-full flex items-center justify-center text-sm">4</span>
                                    O que você sabe fazer?
                                </h2>
                                <div className="mb-6">
                                    <label className="block text-sm font-semibold text-slate-700 mb-3 flex items-center gap-2">
                                        Clique para escolher:
                                        <HelpIcon text="Escolha as que você tem experiência. Pode escolher várias!" />
                                    </label>
                                    <div className="flex flex-wrap gap-2">
                                        {SKILL_PRESETS.map(skill => (
                                            <button
                                                key={skill}
                                                onClick={() => toggleSkill(skill)}
                                                className={`px-4 py-2 rounded-xl text-sm font-semibold transition-all border ${
                                                    data.skills.includes(skill)
                                                        ? 'bg-indigo-600 text-white border-indigo-600 shadow-md scale-105'
                                                        : 'bg-white text-slate-600 border-slate-200 hover:border-indigo-300 hover:bg-slate-50'
                                                }`}
                                            >
                                                {skill}
                                            </button>
                                        ))}
                                    </div>
                                </div>
                                <div className="p-4 bg-slate-50 rounded-xl border border-dashed border-slate-300">
                                    <label className="block text-sm font-semibold text-slate-700 mb-2">Outra habilidade:</label>
                                    <input 
                                        type="text" 
                                        placeholder="Digite aqui e aperte a tecla Enter"
                                        onKeyDown={(e) => {
                                            if (e.key === 'Enter' && e.target.value) {
                                                if (!data.skills.includes(e.target.value)) {
                                                    setData({...data, skills: [...data.skills, e.target.value]});
                                                }
                                                e.target.value = '';
                                            }
                                        }}
                                        className="w-full rounded-xl border-slate-200 p-3 border focus:border-indigo-500 focus:ring-4 focus:ring-indigo-500/10 transition-all"
                                    />
                                </div>
                            </section>

                            {/* Botão de Exportar */}
                            <div className="pt-6 pb-20">
                                <button 
                                    onClick={exportPDF}
                                    className="w-full bg-green-600 text-white py-5 rounded-2xl font-bold text-xl hover:bg-green-700 transition-all shadow-xl hover:shadow-green-200 flex flex-col items-center justify-center gap-1 group"
                                >
                                    <span className="flex items-center gap-2 group-hover:scale-110 transition-transform">
                                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="currentColor" viewBox="0 0 16 16">
                                            <path d="M.5 9.9a.5.5 0 0 1 .5.5v2.5a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1v-2.5a.5.5 0 0 1 1 0v2.5a2 2 0 0 1-2 2H2a2 2 0 0 1-2-2v-2.5a.5.5 0 0 1 .5-.5z"/>
                                            <path d="M7.646 11.854a.5.5 0 0 0 .708 0l3-3a.5.5 0 0 0-.708-.708L8.5 10.293V1.5a.5.5 0 0 0-1 0v8.793L5.354 8.146a.5.5 0 1 0-.708.708l3 3z"/>
                                        </svg>
                                        PRONTO! SALVAR MEU CURRÍCULO
                                    </span>
                                    <span className="text-xs font-normal text-green-100 opacity-80">Clique aqui para baixar o arquivo em PDF</span>
                                </button>
                            </div>
                        </div>
                    </div>

                    {/* Visualização (Preview) */}
                    <div className="w-full lg:w-1/2 bg-slate-200 p-4 md:p-12 overflow-y-auto max-h-screen flex justify-center items-start">
                        <div ref={resumeRef} className="resume-preview">
                            <div className="flex items-start gap-8 mb-10 border-b-4 border-indigo-600 pb-10">
                                {data.photo ? (
                                    <img src={data.photo} alt="Foto de perfil" className="w-40 h-40 rounded-2xl object-cover border-4 border-indigo-50 shadow-md" />
                                ) : (
                                    <div className="w-40 h-40 rounded-2xl bg-slate-50 flex flex-col items-center justify-center text-slate-400 border-2 border-dashed border-slate-300 gap-2">
                                        <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" fill="currentColor" viewBox="0 0 16 16">
                                            <path d="M10.5 8.5a2.5 2.5 0 1 1-5 0 2.5 2.5 0 0 1 5 0z"/>
                                            <path d="M2 4a2 2 0 0 1 2-2h7.929A2 2 0 0 1 13.5 3.571V4.5H14a2 2 0 0 1 2 2v2a2 2 0 0 1-2 2H13.5v.929A2 2 0 0 1 11.929 13H4a2 2 0 0 1-2-2V4zm2-1a1 1 0 0 0-1 1v7a1 1 0 0 0 1 1h7.929a1 1 0 0 0 .571-.179V11.5H14V6.5h-.5v-1.929a1 1 0 0 0-.179-.571H4z"/>
                                        </svg>
                                        <span className="text-xs font-bold uppercase tracking-widest">Sem Foto</span>
                                    </div>
                                )}
                                <div className="flex-1">
                                    <h1 className="text-4xl font-extrabold text-slate-900 mb-4 leading-tight">{data.name}</h1>
                                    <div className="grid grid-cols-1 gap-3 text-slate-600 font-medium">
                                        <p className="flex items-center gap-3">
                                            <span className="bg-slate-100 p-1.5 rounded-lg text-indigo-600">📧</span> 
                                            {data.email}
                                        </p>
                                        <p className="flex items-center gap-3">
                                            <span className="bg-slate-100 p-1.5 rounded-lg text-indigo-600">📱</span> 
                                            {data.phone}
                                        </p>
                                        <p className="flex items-center gap-3">
                                            <span className="bg-slate-100 p-1.5 rounded-lg text-indigo-600">📍</span> 
                                            {data.location}
                                        </p>
                                    </div>
                                </div>
                            </div>

                            <div className="grid grid-cols-3 gap-12">
                                <div className="col-span-2 space-y-12">
                                    <section>
                                        <h3 className="text-xl font-black text-indigo-700 uppercase tracking-widest mb-6 border-l-8 border-indigo-600 pl-4 bg-indigo-50 py-2">Sobre Mim</h3>
                                        <p className="text-slate-700 leading-relaxed text-base font-medium">{data.summary}</p>
                                    </section>

                                    <section>
                                        <h3 className="text-xl font-black text-indigo-700 uppercase tracking-widest mb-6 border-l-8 border-indigo-600 pl-4 bg-indigo-50 py-2">Experiência</h3>
                                        <div className="space-y-8">
                                            {data.experience.map(exp => (
                                                <div key={exp.id} className="relative pl-6 border-l-2 border-slate-200">
                                                    <div className="absolute w-3 h-3 bg-indigo-600 rounded-full -left-[7px] top-1.5 shadow-sm"></div>
                                                    <div className="flex justify-between items-start mb-2">
                                                        <h4 className="font-bold text-slate-900 text-lg">{exp.role}</h4>
                                                        <span className="text-xs font-black text-indigo-600 bg-indigo-50 px-3 py-1 rounded-full uppercase">{exp.period}</span>
                                                    </div>
                                                    <p className="text-indigo-600 font-bold mb-3">{exp.company}</p>
                                                    <p className="text-slate-600 leading-relaxed whitespace-pre-line">{exp.description}</p>
                                                </div>
                                            ))}
                                        </div>
                                    </section>

                                    <section>
                                        <h3 className="text-xl font-black text-indigo-700 uppercase tracking-widest mb-6 border-l-8 border-indigo-600 pl-4 bg-indigo-50 py-2">Estudos</h3>
                                        <div className="space-y-6">
                                            {data.education.map(edu => (
                                                <div key={edu.id} className="relative pl-6 border-l-2 border-slate-200">
                                                    <div className="absolute w-3 h-3 bg-indigo-600 rounded-full -left-[7px] top-1.5 shadow-sm"></div>
                                                    <div className="flex justify-between items-start mb-1">
                                                        <h4 className="font-bold text-slate-900 text-lg">{edu.degree}</h4>
                                                        <span className="text-xs font-black text-indigo-600 bg-indigo-50 px-3 py-1 rounded-full uppercase">{edu.period}</span>
                                                    </div>
                                                    <p className="text-slate-600 font-bold">{edu.school}</p>
                                                </div>
                                            ))}
                                        </div>
                                    </section>
                                </div>

                                <div className="col-span-1">
                                    <section>
                                        <h3 className="text-xl font-black text-indigo-700 uppercase tracking-widest mb-6 border-l-8 border-indigo-600 pl-4 bg-indigo-50 py-2 text-center">Habilidades</h3>
                                        <div className="flex flex-col gap-3">
                                            {data.skills.map(skill => (
                                                <span key={skill} className="bg-slate-50 text-slate-700 px-4 py-2.5 rounded-xl text-sm font-bold border-2 border-slate-100 text-center shadow-sm">
                                                    {skill}
                                                </span>
                                            ))}
                                        </div>
                                    </section>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
